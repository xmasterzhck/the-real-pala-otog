```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter, Arial, Helvetica, sans-serif;
background:#18191c;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* NAVBAR */

.navbar{
height:48px;
background:#232527;
display:flex;
align-items:center;
padding:0 18px;
gap:20px;
border-bottom:1px solid #2f3134;
}

.logo{
font-size:20px;
font-weight:600;
cursor:pointer;
}

.navlinks{
display:flex;
gap:18px;
font-size:14px;
color:#d3d3d3;
}

.navlinks span{
cursor:pointer;
}

.navlinks span:hover{
color:white;
}

.search{
margin-left:auto;
width:340px;
background:#393b3d;
border:none;
border-radius:8px;
padding:8px 12px;
color:white;
font-size:13px;
}

.search::placeholder{
color:#aaa;
}

.search:focus{
outline:none;
background:#44474a;
}

.user{
display:flex;
align-items:center;
gap:15px;
margin-left:20px;
font-size:14px;
}

.robux{
display:flex;
align-items:center;
gap:6px;
background:#2d2f31;
padding:5px 10px;
border-radius:6px;
font-weight:600;
}

/* TOAST */

.toast{
position:fixed;
top:-80px;
left:50%;
transform:translateX(-50%);
background:#1db954;
padding:12px 20px;
border-radius:6px;
font-size:13px;
transition:0.4s;
}

.toast.show{
top:18px;
}

/* CENTER */

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* POPUP */

.popup{
background:#232527;
width:320px;
padding:24px;
border-radius:10px;
border:1px solid #2f3134;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.popup h3{
margin-top:0;
margin-bottom:16px;
font-size:18px;
}

/* INPUTS */

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #3a3b3d;
background:#2b2d30;
color:white;
font-size:14px;
}

input:focus{
outline:none;
border-color:#5a5c60;
}

/* BUTTONS */

button{
width:100%;
padding:10px;
border-radius:8px;
border:none;
cursor:pointer;
font-size:14px;
}

.send{
background:#ffffff;
color:#000;
font-weight:600;
margin-top:6px;
}

.send:hover{
background:#e8e8e8;
}

.cancel{
background:transparent;
color:#aaa;
margin-top:6px;
}

.cancel:hover{
color:white;
}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
font-size:12px;
color:#8b8b8b;
border-top:1px solid #2f3134;
}

.footer a{
color:#8b8b8b;
text-decoration:none;
margin:0 8px;
}

.footer a:hover{
color:white;
}

</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="navbar">

<div class="logo">◻</div>

<div class="navlinks">
<span>Charts</span>
<span>Marketplace</span>
<span>Create</span>
<span>Robux</span>
</div>

<input class="search" placeholder="Search">

<div class="user">
<div class="robux">🪙 <span id="balance">3241096</span></div>
</div>

</div>

<div class="container">

<div class="popup">

<h3>Send Group Payout</h3>

<input id="username" placeholder="Username">
<input id="amount" type="number" placeholder="Amount (R$)">

<button class="send" onclick="sendPayout()">Send</button>
<button class="cancel" onclick="clearFields()">Cancel</button>

</div>

</div>

<div class="footer">
<a href="#">Parents</a>
<a href="#">Gift Cards</a>
<a href="#">Help</a>
<a href="#">Terms</a>
<a href="#">Accessibility</a>
<a href="#">Privacy</a>
<a href="#">Your Privacy Choices</a>
<br><br>
©2025 Roblox Corporation.
</div>

<script>

function showToast(text){

let t=document.getElementById("toast")
t.textContent=text

t.classList.add("show")

setTimeout(()=>{
t.classList.remove("show")
},3000)

}

function sendPayout(){

let user=document.getElementById("username").value
let amount=document.getElementById("amount").value

if(!user || !amount){
alert("Enter username and amount")
return
}

showToast("Group funds sent! "+amount+" Robux paid to "+user)

/* clear fields after sending */
document.getElementById("username").value=""
document.getElementById("amount").value=""

}

function clearFields(){
document.getElementById("username").value=""
document.getElementById("amount").value=""
}

</script>

</body>
</html>
```
